<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Verification | WarrantyChain</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .animate-gradient {
            background-size: 200% 200%;
            animation: gradient 8s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    <!-- Animated background orbs -->
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/20 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-600/20 rounded-full blur-[120px] pointer-events-none"></div>

    <div id="content" class="w-full max-w-xl relative z-10 opacity-0 transform translate-y-4 transition-all duration-700">
        <!-- Logo Branding -->
        <div class="flex flex-col items-center mb-10">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center shadow-2xl shadow-blue-500/40 mb-4 animate-bounce">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></svg>
            </div>
            <h1 class="text-2xl font-black tracking-widest uppercase text-slate-400">WarrantyChain</h1>
        </div>

        <div class="glass-card rounded-[2.5rem] p-8 md:p-10 shadow-2xl relative overflow-hidden">
            <!-- Status Badge -->
            <div id="status-badge" class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-[0.2em] border mb-8">
                <div class="w-2 h-2 rounded-full bg-current"></div>
                <span id="status-text">Checking Status</span>
            </div>

            <div class="space-y-10">
                <!-- Header -->
                <div class="border-b border-white/10 pb-6">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Product Details</p>
                    <h2 id="product-name" class="text-4xl md:text-5xl font-black text-white tracking-tight leading-none mb-3 truncate">Product Name</h2>
                    <p id="product-id" class="text-sm font-mono text-blue-400 opacity-80 tracking-wider">ID: 0x000000000</p>
                </div>

                <!-- Info Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Owner Name</p>
                        <p id="owner-name" class="text-xl font-bold text-slate-100 flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-500"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            John Doe
                        </p>
                    </div>
                    <div>
                        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Warranty Ends</p>
                        <p id="expiry-date" class="text-xl font-bold text-slate-100 flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-500"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                            DD MMM YYYY
                        </p>
                    </div>
                </div>

                <!-- Trust Footer -->
                <div class="pt-8 border-t border-white/10 flex flex-col items-center justify-center">
                    <div class="flex items-center gap-3 text-[10px] uppercase font-bold text-blue-500 tracking-[0.3em] mb-2">
                        <span class="w-1 h-1 rounded-full bg-blue-500"></span>
                        Decentralized Verification Secured
                        <span class="w-1 h-1 rounded-full bg-blue-500"></span>
                    </div>
                    <p class="text-[9px] text-slate-600 font-medium">© 2026 WARRANTYCHAIN PROTOCOL</p>
                </div>
            </div>
        </div>

        <p class="text-center mt-8 text-slate-500 text-xs font-medium">This document is cryptographically verified on the blockchain.</p>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            
            const name = params.get('name') || "Unknown Product";
            const id = params.get('id') || "N/A";
            const owner = params.get('owner') || "Private Owner";
            const status = (params.get('status') || "Inactive").toLowerCase();
            const valid = params.get('valid') || "N/A";

            // Update DOM
            document.getElementById('product-name').textContent = name;
            document.getElementById('product-id').textContent = 'ID: ' + id;
            document.getElementById('owner-name').innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-500 shrink-0"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> ${owner}`;
            document.getElementById('expiry-date').innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-500 shrink-0"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> ${valid}`;

            const badge = document.getElementById('status-badge');
            const statusText = document.getElementById('status-text');

            if (status === 'active' || status === 'valid') {
                badge.classList.add('bg-emerald-500/10', 'border-emerald-500/30', 'text-emerald-400');
                statusText.textContent = 'Warranty Active ✅';
            } else {
                badge.classList.add('bg-red-500/10', 'border-red-500/30', 'text-red-400');
                statusText.textContent = 'Warranty Expired ❌';
            }

            // Entry Animation
            setTimeout(() => {
                const content = document.getElementById('content');
                content.classList.remove('opacity-0', 'translate-y-4');
                content.classList.add('opacity-100', 'translate-y-0');
            }, 100);
        });
    </script>
</body>
</html>
